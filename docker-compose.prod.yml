version: '3.8'

services:
  # ----------------------------------------------------------------
  # 1. TU APLICACIÓN QUARKUS
  # ----------------------------------------------------------------
  app:
    image: urgosxd7/my-app-prod:latest
    container_name: quarkus-app-prod
    restart: always
    env_file:
      - .env.prod
    expose:
      - "8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - prod-network
      - red-compartida
      - proxiable
    environment:
      # Database — Quarkus reads these via ${DB_URL}, ${DB_USER}, ${DB_PASSWORD}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}

      # Keycloak
      KEYCLOAK_INTERNAL_URL: http://keycloak-prod:8080
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      # RabbitMQ (externo - gestionado en otro docker-compose)
      RABBITMQ_URL: ${RABBITMQ_URL}

      # Vault
      VAULT_URL: ${VAULT_URL}
      VAULT_USERNAME: ${VAULT_USERNAME}
      VAULT_PASSWORD: ${VAULT_PASSWORD}

      # OpenTelemetry
      OTEL_EXPORTER_ENDPOINT: ${OTEL_EXPORTER_ENDPOINT:-http://otel-collector:4317}

      # Quarkus profile
      QUARKUS_PROFILE: prod
    cpus: 1.0
    mem_limit: 1024m
    mem_reservation: 512m
    pids_limit: 300



  # ----------------------------------------------------------------
  # 2. BASE DE DATOS (POSTGRES)
  # ----------------------------------------------------------------
  postgres:
    image: postgres:15
    container_name: postgres-prod-app
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aa} -d ${POSTGRES_DB:-aa}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - prod-network
    cpus: 0.75
    mem_limit: 768m
    mem_reservation: 384m
    pids_limit: 200


volumes:
  postgres_data:

networks:
  proxiable:
    external: true
    name: proxiable
  prod-network:
    driver: bridge
  red-compartida:
    external: true
    name: red-compartida
