quarkus:
  http:
    host: 0.0.0.0
    cors:
      enabled: true
      origins: /.*/
  
  ssl:
    native: true

  banner:
    enabled: false

  log:
    level: INFO
    format: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{correlationId}] [%X{traceId}/%X{spanId}] %logger{36} - %msg%n"
    console:
      json:
        enabled: true
        pretty-print: false

  # OpenTelemetry
  otel:
    enabled: true
    exporter:
      otlp:
        endpoint: http://localhost:4317
        protocol: grpc
    resource:
      attributes: "service.name=user-bounded-context,service.version=0.0.1"
    traces:
      sampler: parentbased_traceidratio
      sampler.arg: 1.0

  # Micrometer
  micrometer:
    export:
      prometheus:
        enabled: true
      otlp:
        enabled: true
        endpoint: http://localhost:4317
        step: 60s

  # Default OIDC config - CustomOidcResolver provides dynamic tenant config
  oidc:
    tenant-enabled: false
    discovery-enabled: false

"%prod":
  eventbus:
    external:
      enabled: true
  quarkus:
    ssl:
      native: true
    http:
      cors:
        origins: /.*/
    otel:
      exporter:
        otlp:
          endpoint: ${OTEL_EXPORTER_ENDPOINT:http://otel-collector:4317}
          protocol: grpc
    micrometer:
      export:
        otlp:
          enabled: ${OTEL_METRICS_ENABLED:true}
          endpoint: ${OTEL_EXPORTER_ENDPOINT:http://otel-collector:4317}
          step: 60s
  vault:
    url: ${VAULT_URL:http://localhost:8200}

    # vault authentication
    authentication:
      userpass:
        username: ${VAULT_USERNAME}
        password: ${VAULT_PASSWORD}

    # path within the kv secret engine where is located the vault-quickstart secret configuration
    secret-config-kv-path: secret/myapp/config
  
"%dev":
  eventbus:
    external:
      enabled: true
  quarkus:
    http:
      cors:
        origins: /.*/
    oidc:
      tenant-enabled: false
      discovery-enabled: false
    devservices:
      timeout: 300
    rabbitmq-devservices:
      enabled: false
    vault:
      devservices:
        init-commands: 'kv put secret/config password="p@$$w0rd"'
    keycloak:
      devservices:
        enabled: true
    otel:
      exporter:
        otlp:
          enabled: true
          endpoint: http://localhost:4317
          protocol: grpc
    micrometer:
      export:
        otlp:
          enabled: true
          endpoint: http://localhost:4317
          step: 60s

    log:
      console:
        json: true
      category:
        "com.microservice.quarkus":
          level: DEBUG
        "io.quarkus.vault":
          level: DEBUG
      file:
        enable: true
        path: target/quarkus.log
        level: ALL

"%test":
  eventbus:
    external:
      enabled: false
  quarkus:
    otel:
      simple: true
      exporter:
        otlp:
          enabled: true
          endpoint: http://localhost:4317
          protocol: grpc
    micrometer:
      export:
        prometheus:
          enabled: true
        otlp:
          enabled: true
          endpoint: http://localhost:4317
          step: 1s
    log:
      console:
        json: true
